<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="contact.style.css">
    <link rel="stylesheet" href="style.css">
    <title>Contact</title>
</head>
<body>
    <section class="contact">

    <div class="contact-heading">

        <h1>Contact <span>Me</span></h1>

        <p>
            Have a project in mind or need a website for your business?
            I'd love to hear about your ideas. Let's build something great together.
        </p>

    </div>

    <div class="contact-container">

        <div class="contact-info">

            <div class="info-box">
                <i class="fa-solid fa-envelope"></i>
                <h3>Email</h3>
                <p>ayannaayak@gmail.com</p>
            </div>

            <div class="info-box">
                <i class="fa-brands fa-whatsapp"></i>
                <h3>Whatsapp</h3>
                <p>+91 8670492943</p>
            </div>

            <div class="info-box">
                <i class="fa-solid fa-phone"></i>
                <h3>Ph no.</h3>
                <p>+91 8670492943</p>
            </div>

        </div>

        <form class="contact-form">

            <input type="text" placeholder="Your Name" required>

            <input type="email" placeholder="Your Email" required>

            <input type="text" placeholder="Subject">

            <textarea rows="7" placeholder="Tell me about your project..." required></textarea>

            <button class="btn">Send Message</button>

        </form>

    </div>

</section>
</body>
</html>
